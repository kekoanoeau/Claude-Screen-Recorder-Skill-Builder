<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>csrsb</title>
    <style>
      body { font-family: -apple-system, system-ui, sans-serif; width: 320px; padding: 12px; margin: 0; }
      h1 { font-size: 14px; margin: 0 0 8px; }
      label { display: block; font-size: 12px; margin-top: 8px; color: #444; }
      input[type=text], input[type=url] { width: 100%; box-sizing: border-box; font-size: 12px; padding: 4px; }
      .row { display: flex; gap: 6px; margin-top: 12px; }
      button { flex: 1; padding: 6px 8px; font-size: 13px; cursor: pointer; }
      button.primary { background: #c4453d; color: white; border: 1px solid #a23028; border-radius: 3px; }
      button.secondary { background: #f0f0f0; border: 1px solid #ccc; border-radius: 3px; }
      .status { margin-top: 10px; font-size: 12px; color: #666; }
      .consent { margin-top: 8px; padding: 8px; background: #fff7e6; border: 1px solid #f5c842; border-radius: 3px; font-size: 11px; color: #604200; }
    </style>
  </head>
  <body>
    <h1>Claude Screen Recorder</h1>
    <div class="consent">
      Recording captures clicks, typed text, and screenshots of the visible tab.
      Avoid recording windows that show secrets or other people's data.
    </div>

    <label>What is this recording for? (optional)</label>
    <input type="text" id="intent" placeholder="e.g. download Q1 invoices">

    <label>Upload to local server</label>
    <input type="url" id="serve_url" value="http://127.0.0.1:7778/recordings">

    <div class="row">
      <button class="primary" id="start">Start</button>
      <button class="secondary" id="stop" disabled>Stop</button>
    </div>
    <div class="row">
      <button class="secondary" id="add_note" disabled>Add note</button>
    </div>

    <div class="status" id="status">idle</div>
    <script src="popup.js"></script>
  </body>
</html>
